<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Man-Trap Control - AI Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="aicontrol.css">
    <link rel="stylesheet" href="logout.css">
   
   
</head>
<body class="simulation-background">

    <div class = "whole-header">
        
        
        <div class="main-navigation-bar">

            <div class="monitor-page-link simulate-page-link-selected" onclick="openMonitorPage()">MONITOR</div>
            <div class="command-page-link simulate-page-link-selected" onclick="openControlPage()">CONTROL</div>
            <div class="faults-page-link simulate-page-link-selected" onclick="openFaultsPage()">FAULTS</div>
            <div class="ai-page-link simulate-page-link-selected">AI CONTROL</div>

        </div>


        <div class="user-header">

            <button class="evacuate"> EVACUATE! </button>
            <div class="js-navigation-menu"><img class="navigation-menu" onclick="showSideNavigationBar()" src="navigation-menu.png" alt="nav logo"></div>
            <div class="user-pic"> <div class="user-name">B</div> </div>

        </div>
                
    </div> 
   
    
    <div class ="js-side-navigation-bar">
        <div class = "hidden-side-navigation-bar">
        </div>
        <div class="logout-button-placing"></div>
    </div>

    <div class="ai-container">
        <div class="ai-layout">
            <!-- Left Column - Top Four Cards -->
            <div class="ai-left-column">
                <!-- Main AI System Toggle -->
                <div class="ai-main-toggle">
                    <div class="toggle-card">
                        <div class="toggle-header">
                            <h2>AI Security System</h2>
                            <label class="switch">
                                <input type="checkbox" id="aiSystemToggle" onchange="toggleAiSystem()">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <p class="toggle-status">System <span id="aiSystemStatus">OFF</span></p>
                    </div>
                </div>

                <!-- AI Configuration Toggles -->
                <div class="ai-config-section">
                    <div class="config-card">
                        <div class="config-toggle">
                            <span class="config-label">Masked Face Detection</span>
                            <label class="switch small-switch">
                                <input type="checkbox" id="maskedFaceToggle" onchange="toggleMaskedFace()">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="config-toggle">
                            <span class="config-label">Weapon Detection</span>
                            <label class="switch small-switch">
                                <input type="checkbox" id="weaponToggle" onchange="toggleWeapon()">
                                <span class="slider round"></span>
                            </label>
                        </div>
                        <div class="config-toggle">
                            <span class="config-label">AI Controls Doors</span>
                            <label class="switch small-switch">
                                <input type="checkbox" id="aiDoorControlToggle" onchange="toggleAiDoorControl()">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Setup Cards -->
                <div class="setup-cards-container">
                    <!-- On Weapon Detection Card -->
                    <div class="setup-card" id="weaponSetupCard">
                        <div class="setup-header">
                            <h3>1. On Weapon Detection</h3>
                        </div>
                        <form class="mode-selection">
                            <div class="mode-option">
                                <input type="radio" name="weapon-mode" id="weapon-evacuate" value="evacuate" onchange="updateAiMode('weapon', 'evacuate')">
                                <label for="weapon-evacuate" class="mode-label">
                                    <span class="mode-name">Evacuate</span>
                                    <span class="mode-desc">Unlock All</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="weapon-mode" id="weapon-normal" value="normal" onchange="updateAiMode('weapon', 'normal')">
                                <label for="weapon-normal" class="mode-label">
                                    <span class="mode-name">Normal-Traffic</span>
                                    <span class="mode-desc">Allow Entrance & Exit</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="weapon-mode" id="weapon-exit" value="exit" onchange="updateAiMode('weapon', 'exit')">
                                <label for="weapon-exit" class="mode-label">
                                    <span class="mode-name">Exit-Only</span>
                                    <span class="mode-desc">Block Entrance</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="weapon-mode" id="weapon-entrance" value="entrance" onchange="updateAiMode('weapon', 'entrance')">
                                <label for="weapon-entrance" class="mode-label">
                                    <span class="mode-name">Entrance-Only</span>
                                    <span class="mode-desc">Block Exit</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="weapon-mode" id="weapon-lock" value="lock" checked onchange="updateAiMode('weapon', 'lock')">
                                <label for="weapon-lock" class="mode-label">
                                    <span class="mode-name">Lock-All</span>
                                    <span class="mode-desc">Lock All Doors</span>
                                </label>
                            </div>
                        </form>
                    </div>

                    <!-- On Masked Face Card -->
                    <div class="setup-card" id="maskedFaceSetupCard">
                        <div class="setup-header">
                            <h3>2. On Masked Face</h3>
                        </div>
                        <form class="mode-selection">
                            <div class="mode-option">
                                <input type="radio" name="masked-mode" id="masked-evacuate" value="evacuate" onchange="updateAiMode('masked', 'evacuate')">
                                <label for="masked-evacuate" class="mode-label">
                                    <span class="mode-name">Evacuate</span>
                                    <span class="mode-desc">Unlock All</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="masked-mode" id="masked-normal" value="normal" onchange="updateAiMode('masked', 'normal')">
                                <label for="masked-normal" class="mode-label">
                                    <span class="mode-name">Normal-Traffic</span>
                                    <span class="mode-desc">Allow Entrance & Exit</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="masked-mode" id="masked-exit" value="exit" onchange="updateAiMode('masked', 'exit')">
                                <label for="masked-exit" class="mode-label">
                                    <span class="mode-name">Exit-Only</span>
                                    <span class="mode-desc">Block Entrance</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="masked-mode" id="masked-entrance" value="entrance" onchange="updateAiMode('masked', 'entrance')">
                                <label for="masked-entrance" class="mode-label">
                                    <span class="mode-name">Entrance-Only</span>
                                    <span class="mode-desc">Block Exit</span>
                                </label>
                            </div>
                            <div class="mode-option">
                                <input type="radio" name="masked-mode" id="masked-lock" value="lock" checked onchange="updateAiMode('masked', 'lock')">
                                <label for="masked-lock" class="mode-label">
                                    <span class="mode-name">Lock-All</span>
                                    <span class="mode-desc">Lock All Doors</span>
                                </label>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Right Column - Live Feed -->
            <div class="ai-right-column">
                <div class="feed-card">
                    <div class="feed-header">
                        <h3>ESP32-CAM Live Feed</h3>
                        <span class="feed-status">Connected</span>
                    </div>
                    <div class="feed-view">
                        <img id="esp32Feed" alt="ESP32 Camera Feed" src="/third.png">
                    </div>
                    <div class="feed-info">
                        <span>Source: /stream</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="utility.js"></script>
<script src="js/api-client.js"></script>
<script src="js/bankSystem.js"></script>
<script src="aicontrol.js"></script>
<script src="script.js"></script>
<script src="logout.js"></script>

</body>
</html>
