<!DOCTYPE html>



<head>

    <title>Man-Trap Control</title>
    <link rel = "stylesheet" href = "monitor.css">
    <link rel="stylesheet" href="logout.css">


</head>




<body class = "simulation-background">



    <div class = "whole-header">
        
        
        <div class = "main-navigation-bar">

            <div class = "monitor-page-link" class = "simulate-page-link-selected" onclick="openMonitorPage()">MONITOR</div>                          
            <div class = "command-page-link" class = "simulate-page-link-selected" onclick="openControlPage()">CONTROL</div>
            <div class = "faults-page-link" class = "simulate-page-link-selected" onclick="openFaultsPage()">FAULTS</div>
            <div class = "ai-page-link" class = "simulate-page-link-selected" onclick="openAiPage()">AI CONTROL</div> 
            
        </div>
        
        
        <div class = "user-header">
            
            <button class = "evacuate"> EVACUATE! </button>
            <div class="js-navigation-menu"><svg class="navigation-menu" onclick="showSideNavigationBar()" viewBox="0 0 24 18" width="30" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" role="button" aria-label="Open menu"><line x1="0" y1="1" x2="24" y2="1"/><line x1="0" y1="9" x2="24" y2="9"/><line x1="0" y1="17" x2="24" y2="17"/></svg></div>
            <div class = "user-pic"> <div class ="user-name">B</div> </div>

        </div>
                
    </div> 
   
    
    <div class ="js-side-navigation-bar">
        <div class = "hidden-side-navigation-bar">
        </div>
        <div class="logout-button-placing"></div>
    </div>

    <div class = "outside-door-lock-icons">
         
            <div class="door-icon-container">
                <div class="door-label">EXT.D4 (Outside Exit)</div>
                <svg id="ext-d4-lock-icon" class="ext-d4-lock-icon locked" viewBox="0 0 32 40" width="35" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="EXT.D4 – Locked"><path d="M8,18 L8,11 C8,3 24,3 24,11 L24,18" stroke="#dc2626" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="17" width="28" height="21" rx="5" fill="#dc2626"/><circle cx="16" cy="26" r="3.5" fill="rgba(0,0,0,0.3)"/><rect x="14.5" y="26" width="3" height="6" rx="1.5" fill="rgba(0,0,0,0.3)"/></svg>
            </div>
            <div>OUTSIDE PREMISES</div>
            <div class="door-icon-container">
                <div class="door-label">ENT.D1 (Outside Entrance)</div>
                <svg id="ent-d1-lock-icon" class="ent-d1-lock-icon locked" viewBox="0 0 32 40" width="35" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="ENT.D1 – Locked"><path d="M8,18 L8,11 C8,3 24,3 24,11 L24,18" stroke="#dc2626" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="17" width="28" height="21" rx="5" fill="#dc2626"/><circle cx="16" cy="26" r="3.5" fill="rgba(0,0,0,0.3)"/><rect x="14.5" y="26" width="3" height="6" rx="1.5" fill="rgba(0,0,0,0.3)"/></svg>
            </div>

    </div>


    <div class = "bank-booth-template">

            <div class = "outside-exit-closed"> </div>
            <div class = "outside-exit-opened"> </div>
            <div class = "outside-entrance-opened"> </div>
            <div class = "outside-entrance-closed"> </div>
            <div class = "inside-exit-closed"> </div>
            <div class = "inside-exit-opened"> </div>
            <div class = "inside-entrance-opened"> </div>
            <div class = "inside-entrance-closed"> </div>
            <div class = "object-detected-entrance"> X -->  </div>
            <div class = "object-detected-exit"> <-- O </div>
            <div class = "booth-divider"> 
            </div>

    </div>

    <div class = "live-view-template">
        <img  class = "live-image-container" src ="/stream" >
       
    </div>




    <div class = "inside-door-lock-icons">

            <div class="door-icon-container">
                <div class="door-label">EXT.D3 (Inside Exit)</div>
                <svg id="ext-d3-lock-icon" class="ext-d3-lock-icon locked" viewBox="0 0 32 40" width="35" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="EXT.D3 – Locked"><path d="M8,18 L8,11 C8,3 24,3 24,11 L24,18" stroke="#dc2626" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="17" width="28" height="21" rx="5" fill="#dc2626"/><circle cx="16" cy="26" r="3.5" fill="rgba(0,0,0,0.3)"/><rect x="14.5" y="26" width="3" height="6" rx="1.5" fill="rgba(0,0,0,0.3)"/></svg>
            </div>
            <div>INSIDE PREMISES</div>
            <div class="door-icon-container">
                <div class="door-label">ENT.D2 (Inside Entrance)</div>
                <svg id="ent-d2-lock-icon" class="ent-d2-lock-icon locked" viewBox="0 0 32 40" width="35" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="ENT.D2 – Locked"><path d="M8,18 L8,11 C8,3 24,3 24,11 L24,18" stroke="#dc2626" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="2" y="17" width="28" height="21" rx="5" fill="#dc2626"/><circle cx="16" cy="26" r="3.5" fill="rgba(0,0,0,0.3)"/><rect x="14.5" y="26" width="3" height="6" rx="1.5" fill="rgba(0,0,0,0.3)"/></svg>
            </div>
        
    </div> 
    

   <div class="log-section">
            <div class="log-header">
                <h3>Door State Logs</h3>
                <div class="log-header-info">
                    <span>Uptime: <span id="system-uptime">00:00:00</span></span>
                    <span>Entries: <span id="total-entries">0</span></span>
                    <span>Exits: <span id="total-exits">0</span></span>
                    <span>Inside: <span id="clients-inside">0</span></span>
                </div>
                <button class="refresh-btn" onclick="clearLogs()">↻</button>
            </div>
        
            <div id="logContainer" class="log-container">
                <div class="empty-log">No recent door activity...</div>
            </div>
    </div>




    <script src="utility.js"></script>
    <script src="js/api-endpoints.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/bankSystem.js"></script>
    <script src="script.js"></script>
    <script src="monitor.js"></script>
    <script src="logout.js"></script>
</body>


</html>
