<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Bank Entrance System</title>
    <link rel="stylesheet" href="create_account.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="create-account-container">
        <div class="create-account-card">
            <div class="card-header">
                <h2>Create New Account</h2>
            </div>
            <div class="about-caption">
                <p class="project-subtitle">Automated Bank Entrance Security System</p>
                <p>Built to improve security, reduce manual intervention, and support predictive maintenance for bank entrance control.</p>
            </div>
            <form id="create-account-form">
                <div class="input-group">
                    <label for="new-username">Username</label>
                    <input type="text" id="new-username" name="new-username" required>
                </div>
                <div class="input-group">
                    <label for="new-password">Password</label>
                    <input type="password" id="new-password" name="new-password" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
                <button type="submit" class="btn-create-account">Create Account</button>
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>
            </form>
            <div class="login-link">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <div class="footer-brand">Connecta. &copy; 2026</div>

                <span>brezhnevndlovu02@gmail.com</span>
            </a>
            <a href="https://github.com/BrezhThatGoodGuy" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
                <span>BrezhThatGoodGuy</span>
            </a>
            <a href="https://wa.me/263785780324" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
                <span>0785780324</span>
            </a>
        </div>
    </footer>

    <script src="create_account.js"></script>
</body>
</html>
