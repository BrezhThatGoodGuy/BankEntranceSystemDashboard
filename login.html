<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bank Entrance System</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="card-header">
                <h2>Bank Entrance System Login</h2>
            </div>
            <div class="about-caption">
                <p class="project-subtitle">Automated Bank Entrance Security System</p>
                <p>AI-enhanced booth control with real-time threat detection, smart door decisions, and guided customer navigation.</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-login">Log In</button>
                <div id="error-message" class="error-message"></div>
            </form>
            <div class="create-account-link">
                <p>Don't have an account? <a href="create_account.html">Create one</a></p>
            </div>
        </div>
    </div>

    <footer class="page-footer">
        <div class="footer-brand">Connecta. &copy; 2026</div>

            <a href="mailto:brezhnevndlovu02@gmail.com" aria-label="Email">

                <span>brezhnevndlovu02@gmail.com</span>
            </a>
            <a href="https://github.com/BrezhThatGoodGuy" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
                <i class="fa-brands fa-github"></i>
                <span>BrezhThatGoodGuy</span>
            </a>
            <a href="https://wa.me/263785780324" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
                <span>0785780324</span>
            </a>
        </div>
    </footer>

    <script src="login.js"></script>
</body>
</html>
